<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Data Kendaraan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<h3 class="mb-4">Aplikasi Data Kendaraan</h3>

<div id="halamanMonitoring">
    <div class=" card mb-3 custom-card-search">
        <div class="card-body bg-warning-subtle">
            <div class="row g-3 align-items-center">
                <div class="col-md-4">
                    <label for="">No Registrasi</label>
                    <input type="text" id="searchNoReg" class="form-control">
                </div>
                <div class="col-md-4">
                    <label for="">Nama Pemilik</label>
                    <input type="text" id="searchNamaPemilik" class="form-control">
                </div>
                <div class="col-md-4 mt-4 pt-2">
                    <button class="btn btn-primary" onclick="loadGrid()">Search</button>
                    <button class="btn btn-secondary ms-2" onclick="showFormAdd()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover">
            <thead  class="table-primary text-center">
                <tr>
                    <th>No</th>
                    <th>No Registrasi</th>
                    <th>Nama Pemilik</th>
                    <th>Merk Kendaraan</th>
                    <th>Tahun Pembuatan</th>
                    <th>Kapasitas</th>
                    <th>Warna</th>
                    <th>Bahan Bakar</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody  id="tableBody">
            </tbody>
        </table>
    </div>

</div>

<div id="halamanForm" style="display: none;">
        <div class="card shadow-sm">
            <div class="card-header bg-white"><h5 id="formTitle" class="mb-0 mt-1">Tambah Kendaraan</h5></div>
            <div class="card-body">
                <form id="formKendaraan">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="">No Registrasi Kendaraan </label>
                            <input type="text" id="inputNoReg" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="">Tahun Pembuatan</label>
                            <input type="number" id="inputTahun" class="form-control" maxlength="4">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Nama Pemilik *</label>
                            <input type="text" id="inputNama" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Kapasitas Silinder</label>
                            <div class="input-group">
                                <input type="number" id="inputKapasitas" class="form-control">
                                <span class="input-group-text">cc</span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Merk Kendaraan</label>
                            <input type="text" id="inputMerk" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="">Warna Kendaraan</label>
                            <select id="inputWarna" class="form-select">
                                <option value="">Pilih Warna</option><option value="Merah">Merah</option>
                                <option value="Hitam">Hitam</option>
                                <option value="Biru">Biru</option>
                                <option value="Abu-Abu">Abu-Abu</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="">Alamat Pemilik Kendaraan</label>
                            <textarea rows="3" id="inputAlamat" class="form-control"></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="">Bahan Bakar</label>
                            <input type="text"  id="inputBBM" class="form-control">
                        </div>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-white">
                <button id="btnSimpan" class="btn btn-primary px-4" onclick="simpanData()">Simpan</button>
                <button class="btn btn-secondary px-4" onclick="kembaliMonitoring()">kembali</button>
            </div>
        </div>
    </div>
<div class="modal fade" id="modalDelete" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body text-center py-4">
                <h5 id="deleteTextMsg" class="mb-4">Anda Yakin Ingin Menghapus Data Ini?</h5>
                <input type="hidden"  id="deleteId">
                <button class="btn btn-danger px-4 me-2" type="button" onclick="eksekusiDelete()">Ok</button>
                <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Batal</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>
</body>
</html>
